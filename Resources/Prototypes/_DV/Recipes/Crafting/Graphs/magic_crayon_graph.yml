- type: constructionGraph
  id: MagicCrayonGraph # Mono: Change id to fit proper graph naming
  start: start
  graph:
    - node: start
      edges:
        - to: magicCrayon
          steps:
            - material: Bluespace
              amount: 1
            - tag: CrayonRed
              name: graphs-MagicCrayonGraph-CrayonRed-name
              icon:
                sprite: Objects/Fun/crayons.rsi
                state: red
            - tag: CrayonGreen
              name: graphs-MagicCrayonGraph-CrayonGreen-name
              icon:
                sprite: Objects/Fun/crayons.rsi
                state: green
            - tag: CrayonBlue
              name: graphs-MagicCrayonGraph-CrayonBlue-name
              icon:
                sprite: Objects/Fun/crayons.rsi
                state: blue
              doAfter: 5
    - node: magicCrayon
      entity: CrayonMagic
