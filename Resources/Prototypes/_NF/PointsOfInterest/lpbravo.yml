# Notes:
# just a little loot n shoot POI. Pretty much the second POI to even exist
- type: pointOfInterest
  id: LPBravo
  parent: BasePOI
  name: poi-LPBravo-name
  minimumDistance: 15000
  maximumDistance: 17000
  spawnGroup: SyndicateFOB
  gridPath: /Maps/_NF/POI/lpbravo.yml
  hideWarp: true
  addComponents:
  - type: IFF
    color: "#C83737"
    flags: [HideLabel]
    readOnly: false
  - type: SyndicateFOB # For pinpointer
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true
  - type: WorldGenDistanceCarver
    distanceThresholds:
    # Dead zone
    - maxDistance: 800
      prob: 0.0
    - maxDistance: 1500
      prob: 0.3

- type: gameMap
  id: LPBravo
  mapName: "Posto de Escuta Bravo"
  mapPath: /Maps/_NF/POI/lpbravo.yml
  minPlayers: 0
  stations:
    LPBravo:
      # FIXME: no records despite shipyard console, could currently be gamed
      stationProto: StandardFrontierOutpost
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Listening Point Bravo'
        - type: StationJobs
          availableJobs: {}
        - type: StationDeadDropHintExempt
