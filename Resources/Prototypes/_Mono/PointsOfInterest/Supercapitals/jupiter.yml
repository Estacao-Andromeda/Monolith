- type: pointOfInterest
  id: Jupiter
  parent: [BaseMobilePOI, BaseRepairablePOI]
  name: poi-Jupiter-name
  minimumDistance: 17000
  maximumDistance: 19000
  spawnGamePreset: [ NFAdventure, NFPirate, MonoStandard, MonoRogueTSF, MonoRogueUSSP, MonoADS, MonoChimera, MonoMixed, MonoAllAtOnce ]
  spawnGroup: Required
  gridPath: /Maps/_Mono/Supercapitals/jupiter.yml
  addComponents:
  - type: IFF
    color: "#d1bf58"
    flags: [HideLabel]
    readOnly: false
  - type: WorldGenDistanceCarver
    distanceThresholds:
    # Dead zone
    - maxDistance: 800
      prob: 0.0
    - maxDistance: 1500
      prob: 0.3

- type: gameMap
  id: Jupiter
  mapName: gamemap-Jupiter-name
  mapPath: /Maps/_Mono/Supercapitals/jupiter.yml
  minPlayers: 0
  stations:
    Jupiter:
      stationProto: RecordsFrontierOutpostCargo
      components:
        - type: StationNameSetup
          mapNameTemplate: 'PDV Jupiter Class Carrier'
        - type: ExtraStationInformation
          icon: /Textures/_NF/Interface/Pirate/piratelogo.png
          stationSubtext: 'frontier-lobby-jupiter-subtext'
          stationDescription: 'frontier-lobby-jupiter-description'
          lobbySortOrder: 2
        - type: StationJobs
          availableJobs:
            PirateFirstMate: [ 1, 1 ] # Mono
            PDVDenasvar: [ 2, 2 ]
            Pirate: [ 8, 8 ] # Mono
          tags:
          - PDVCommand
        - type: StationDeadDropReporting
          messageSet: Pirate
        - type: StationDeadDropHintExempt
