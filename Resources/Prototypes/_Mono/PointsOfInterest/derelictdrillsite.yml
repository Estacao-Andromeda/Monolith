# Notes:
- type: pointOfInterest
  id: Mining
  parent: [BasePOI, BaseRepairablePOI]
  name: poi-Mining-name
  minimumDistance: 5500
  maximumDistance: 9500
  spawnGroup: Required
  gridPath: /Maps/_Mono/POI/derelictdrillsite.yml
  addComponents:
  - type: IFF
    color: "#ccaa55"
  - type: WorldGenDistanceCarver
    distanceThresholds:
    # Dead zone
    - maxDistance: 800
      prob: 0.0
