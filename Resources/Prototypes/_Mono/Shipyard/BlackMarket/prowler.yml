- type: vessel
  id: Prowler
  parent: BaseVesselAntag
  name: vessel-Prowler-name
  description: vessel-Prowler-desc
  limit: 1
  hyperwarLimit: 1
  hyperwarTimelock: 300 # It's hilarious.
  price: 250000
  purchasable: false # Voucher only
  category: Small
  group: BlackMarket
  shuttlePath: /SharedMaps/_Mono/Shuttles/BlackMarket/prowler.yml
  guidebookPage: Null
  class:
  - Pirate
  engine:
  - Plasma

- type: gameMap
  id: Prowler
  mapName: "Prowler"
  mapPath: /SharedMaps/_Mono/Shuttles/BlackMarket/prowler.yml
  minPlayers: 0
  stations:
    Prowler:
      stationProto: StandardFrontierVessel
      gridComponents:
      - type: ShipShieldDisabledGrid # We aren't going to bother with gunnery disabled like old prowler, because shooting guns defeats the point of being stealthy thermally.
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Prowler PDV{1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
