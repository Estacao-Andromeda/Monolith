- type: constructionGraph
  id: Broadsword
  start: start
  graph:
  - node: start
    edges:
    - to: finish
      steps:
      - tool: Anchoring
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 1

      - tool: Screwing
        doAfter: 1

      - material: Cable
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 2

      - tool: Cutting
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 3

      - tag: BroadswordCentralControlModule
        name: graphs-Broadsword-BroadswordCentralControlModule-name
        icon:
          sprite: "Objects/Misc/module.rsi"
          state: "mainboard"
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 4

      - tool: Screwing
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 5

      - tag: BroadswordPeripheralsControlModule
        name: graphs-Broadsword-BroadswordPeripheralsControlModule-name
        icon:
          sprite: "Objects/Misc/module.rsi"
          state: id_mod
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 6

      - tool: Screwing
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 7

      - tag: BroadswordTargetingControlModule
        name: graphs-Broadsword-BroadswordTargetingControlModule-name
        icon:
          sprite: "Objects/Misc/module.rsi"
          state: mcontroller
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 8

      - tool: Screwing
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 9

      - tag: CapacitorStockPart
        name: graphs-Broadsword-CapacitorStockPart-name
        icon:
          sprite: Objects/Misc/stock_parts.rsi
          state: capacitor
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 10

      - tool: Screwing
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 11

      - component: PowerCell
        name: graphs-Broadsword-PowerCell-name
        store: battery-container
        icon:
          sprite: Objects/Power/power_cells.rsi
          state: small
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 12

      - tool: Screwing
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 13

      - material: Steel
        amount: 5
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 14

      - tool: Anchoring
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 15

      - tool: Welding
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 16

      - tag: MechAirTank
        name: graphs-Broadsword-MechAirTank-name
        icon:
          sprite: Objects/Specific/Mech/mecha_equipment.rsi
          state: mecha_air_tank

      - tool: Anchoring
        doAfter: 1

      - tag: MechThruster
        name: graphs-Broadsword-MechThruster-name
        icon:
          sprite: Objects/Specific/Mech/mecha_equipment.rsi
          state: mecha_bin

      - tool: Anchoring
        doAfter: 1

      - tool: Anchoring
        doAfter: 2
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 17

  - node: finish
    edges:
    - to: broadsword
      steps:
      - tool: Welding
        doAfter: 1
    - to: tsfbroadsword
      steps:
      - tag: MechIFFTSF
        name: graphs-Broadsword-MechIFFTSF-name
        icon:
          sprite: Objects/Specific/Mech/mecha_equipment.rsi
          state: tesla
        doAfter: 1
      - tool: Welding
        doAfter: 1
    - to: pdvbroadsword
      steps:
      - tag: MechIFFPDV
        name: graphs-Broadsword-MechIFFPDV-name
        icon:
          sprite: Objects/Specific/Mech/mecha_equipment.rsi
          state: tesla
        doAfter: 1
      - tool: Welding
        doAfter: 1

  - node: broadsword
    actions:
    - !type:BuildMech
      mechPrototype: AFInterceptor

  - node: tsfbroadsword
    actions:
    - !type:BuildMech
      mechPrototype: AFInterceptorTSF

  - node: pdvbroadsword
    actions:
    - !type:BuildMech
      mechPrototype: AFInterceptorPDV
