          sprite: Objects/Specific/Mech/mecha_equipment.rsi
          state: tesla
        doAfter: 1
      - tool: Welding
        doAfter: 1

  - node: spyglass
    actions:
    - !type:BuildMech
      mechPrototype: AFFlailE

  - node: tsfspyglass
    actions:
    - !type:BuildMech
      mechPrototype: AFFlailETSF

  - node: pdvspyglass
    actions:
    - !type:BuildMech
      mechPrototype: AFFlailEPDV
