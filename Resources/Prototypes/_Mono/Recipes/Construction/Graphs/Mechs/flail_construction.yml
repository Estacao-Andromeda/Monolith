- type: constructionGraph
  id: Flail
  start: start
  graph:
  - node: start
    edges:
    - to: finish
      steps:
      - tool: Anchoring
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 1

      - tool: Screwing
        doAfter: 1

      - material: Cable
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 2

      - tool: Cutting
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 3

      - tag: FlailCentralControlModule
        name: graphs-Flail-FlailCentralControlModule-name
        icon:
          sprite: "Objects/Misc/module.rsi"
          state: "mainboard"
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 4

      - tool: Screwing
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 5

      - tag: FlailPeripheralsControlModule
        name: graphs-Flail-FlailPeripheralsControlModule-name
        icon:
          sprite: "Objects/Misc/module.rsi"
          state: id_mod
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 6

      - tool: Screwing
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 7

      - tag: FlailTargetingControlModule
        name: graphs-Flail-FlailTargetingControlModule-name
        icon:
          sprite: "Objects/Misc/module.rsi"
          state: mcontroller
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 8

      - tool: Screwing
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 9

      - tag: CapacitorStockPart
        name: graphs-Flail-CapacitorStockPart-name
        icon:
          sprite: Objects/Misc/stock_parts.rsi
          state: capacitor
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 10

      - tool: Screwing
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 11

      - component: PowerCell
        name: graphs-Flail-PowerCell-name
        store: battery-container
        icon:
          sprite: Objects/Power/power_cells.rsi
          state: small
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 12

      - tool: Screwing
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 13

      - material: Steel
        amount: 5
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 14

      - tool: Anchoring
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 15

      - tool: Welding
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 16

      - tag: MechAirTank
        name: graphs-Flail-MechAirTank-name
        icon:
          sprite: Objects/Specific/Mech/mecha_equipment.rsi
          state: mecha_air_tank

      - tool: Anchoring
        doAfter: 1

      - tag: MechThruster
        name: graphs-Flail-MechThruster-name
        icon:
          sprite: Objects/Specific/Mech/mecha_equipment.rsi
          state: mecha_bin

      - tool: Anchoring
        doAfter: 1

      - tool: Anchoring
        doAfter: 2
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 17

  - node: finish
    edges:
    - to: flail
      steps:
      - tool: Welding
        doAfter: 1
    - to: tsfflail
      steps:
      - tag: MechIFFTSF
        name: graphs-Flail-MechIFFTSF-name
        icon:
          sprite: Objects/Specific/Mech/mecha_equipment.rsi
          state: tesla
        doAfter: 1
      - tool: Welding
        doAfter: 1
    - to: pdvflail
      steps:
      - tag: MechIFFPDV
        name: graphs-Flail-MechIFFPDV-name
        icon:
          sprite: Objects/Specific/Mech/mecha_equipment.rsi
          state: tesla
        doAfter: 1
      - tool: Welding
        doAfter: 1

  - node: flail
    actions:
    - !type:BuildMech
      mechPrototype: AFFlail

  - node: tsfflail
    actions:
    - !type:BuildMech
      mechPrototype: AFFlailTSF

  - node: pdvflail
    actions:
    - !type:BuildMech
      mechPrototype: AFFlailPDV
