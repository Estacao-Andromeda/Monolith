- type: gameMap
  id: Frontier
  mapName: 'Caelestinus Central'
  mapPath: /Maps/_Mono/Outpost/caelestinus_central.yml # Mono
  minPlayers: 0
  maxPlayers: 100
  randomRotation: false
  maxRandomOffset: 0
  stations:
    Frontier:
      stationProto: StandardFrontierStation
      gridComponents:
      - type: StationCargoOrderDatabase
        capacity: 60
      - type: TradeCrateDestination
        destinationProto: Trade
      - type: VesselMusic
        ambientMusicPrototype: ColossusCentralMusic
      - type: VesselInfo
        description: "The closest thing to civilisation in this sector. You almost feel safe."
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Caelestinus Central'
#          nameGenerator:
#            !type:NanotrasenNameGenerator
#            prefixCreator: '14'
        - type: ExtraStationInformation
          icon: /Textures/_Mono/Logo/icon/icon-256x256.png # used the biggest one, looks better when downscaling than upscaling
          stationSubtext: 'frontier-lobby-frontier-subtext'
          stationDescription: 'frontier-lobby-frontier-description'
          lobbySortOrder: 1
        # - type: StationPlanetSpawner # Mono - Commented out planet spawner (for now)
        #   planet: DesertWorld
        #   gridPath: /Maps/_Mono/POI/surface_outpost_desert.yml
        - type: StationJobs
          availableJobs:
            Contractor: [ -1, -1 ]
            Pilot: [ -1, -1 ]
            Mercenary: [ -1, -1 ]
            Borg: [ -1, -1 ]
            StationRepresentative: [ 1, 1 ]
            StationTrafficController: [ 2, 2 ]
            SecurityGuard: [ 3, 3 ]
            CCServiceWorker: [ 2, 2 ]
            NFJanitor: [ 2, 2 ]
            MailCarrier: [ 2, 2 ]
            DirectorOfCare: [ 1, 1 ]
            MdMedic: [ -1, -1 ]
          tags:
          - HeadOfPersonnel
          - HeadOfSecurity

- type: gameMap
  id: EmptyFrontier
  mapName: Empty
  mapPath: /Maps/Test/empty.yml
  minPlayers: 0
  stations:
    Empty:
      stationProto: StandardFrontierStation
      components:
        - type: StationNameSetup
          mapNameTemplate: "Empty"
