- type: entity
  parent: BallisticTurretHeavyBase
  id: BallisticTurretHeavyAIBase
  name: heavy remote sentry turret
  abstract: true
  components:
  - type: AccessReader
    access: [["Security"]]
  - type: DeployableTurret
    retractedDamageModifierSetId: Metallic
    deployedDamageModifierSetId: Metallic
    deploymentSound:
      path: /Audio/_Mono/Effects/Machines/twobeep_high.ogg
    retractionSound:
      path: /Audio/_Mono/Effects/Machines/triple_beep.ogg
  - type: TurretTargetSettings
    exemptAccessLevels:
    - Security
    - Borg
    - BasicSilicon
  - type: ProjectileBatteryAmmoProvider
    proto: Bullet762x51mmRubber
    fireCost: 100
  - type: DeviceNetworkRequiresPower
  - type: WiredNetworkConnection
  - type: UserInterface
    interfaces:
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface
  - type: WiresPanel
  - type: WiresVisuals
  - type: Wires
    boardName: wires-board-name-weapon-energy-turret
    layoutId: WeaponEnergyTurret
  - type: Lock
    locked: true
    unlockOnClick: false
  - type: LockedWiresPanel
  - type: BatteryWeaponFireModes
    fireModes:
    - proto: Bullet762x51mmRubber
      fireCost: 100
    - proto: Bullet762x51mmAntiMaterial
      fireCost: 100
  - type: DeviceNetwork
    deviceNetId: Wired
    sendBroadcastAttemptEvent: true
    prefix: device-address-prefix-turret
    examinableAddress: true
    receiveFrequencyId: TurretControlAI
    transmitFrequencyId: TurretAI
  - type: HTN
    enabled: false
  - type: StationAiWhitelist
  - type: NpcFactionMember
    factions:
    - AllHostile

- type: entity
  parent: WeaponEnergyTurretStationControlPanel
  id: WeaponEnergyTurretTSFControlPanel
  name: TSF sentry turret control panel
  suffix: TSF Engineer access
  description: A wall-mounted interface that allows a local artifical intelligence to adjust the operational parameters of linked sentry turrets.
  components:
  - type: AccessReader
    access: [["TsfmcEngineering"]]
  - type: TurretTargetSettings
    exemptAccessLevels:
    - HeadOfSecurity
    - Armory
    - Bailiff
    - Sergeant
    - Security
    - TsfmcEngineering
  - type: DeviceNetwork
    receiveFrequencyId: TurretAITSF
    transmitFrequencyId: TurretControlAITSF

