    key: enum.GatewayUiKey.Key
  - type: UserInterface
    interfaces:
      enum.GatewayUiKey.Key:
        type: GatewayBoundUserInterface
  - type: Gateway
    enabled: true
 #   tagRestriction: Central  #TODO: implement this
  - type: Tag
