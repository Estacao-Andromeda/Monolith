- type: noiseChannel
  id: DensityExtreme
  noiseType: Perlin
  fractalLacunarityByPi: 0.666666666
  remapTo0Through1: true
  clippingRanges:
  - 0.0, 0.5
  clippedValue: 0.1 # MONO NOTE = BIGGER = SMALLER AMOUNT OF ASTEROIDS!!!
  inputMultiplier: 3 # Makes density hopefully low noise in the local area while still being interesting at scale.
  outputMultiplier: 150 # We scale density up significantly for more human-friendly numbers.
  minimum: 0.25

- type: noiseChannel
  id: DensityHigh
  noiseType: Perlin
  fractalLacunarityByPi: 0.666666666
  remapTo0Through1: true
  clippingRanges:
  - 0.0, 0.5
  clippedValue: 0.25 # MONO NOTE = BIGGER = SMALLER AMOUNT OF ASTEROIDS!!!
  inputMultiplier: 3 # Makes density hopefully low noise in the local area while still being interesting at scale.
  outputMultiplier: 150 # We scale density up significantly for more human-friendly numbers.
  minimum: 0.25

- type: noiseChannel
  id: DensityRare
  noiseType: Perlin
  fractalLacunarityByPi: 0.666666666
  remapTo0Through1: true
  clippingRanges:
  - 0.4, 0.6
  clippedValue: 25 # MONO NOTE = BIGGER = SMALLER AMOUNT OF ASTEROIDS!!!
  inputMultiplier: 3 # Makes density hopefully low noise in the local area while still being interesting at scale.
  outputMultiplier: 5000.0 # We scale density up significantly for more human-friendly numbers.
  minimum: 0.25

- type: noiseChannel
  id: DensityVeryRare
  noiseType: Perlin
  fractalLacunarityByPi: 0.666666666
  remapTo0Through1: true
  clippingRanges:
  - 0.4, 0.6
  clippedValue: 30
  inputMultiplier: 3
  outputMultiplier: 7500.0
  minimum: 0.25

- type: noiseChannel
  id: DensityExtremelyRare
  noiseType: Perlin
  fractalLacunarityByPi: 0.666666666
  clippingRanges:
  - 0.0, 0.4
  clippedValue: 0
  remapTo0Through1: true
  inputMultiplier: 16
  outputMultiplier: 0.1

- type: noiseChannel
  id: WreckRare
  noiseType: Perlin
  fractalLacunarityByPi: 0.666666666
  clippingRanges:
  - 0.0, 0.4
  clippedValue: 0
  remapTo0Through1: true
  outputMultiplier: 0
  minimum: 0.2 # constant probability

- type: noiseChannel
  id: WreckExtremelyRare
  noiseType: Perlin
  fractalLacunarityByPi: 0.666666666
  clippingRanges:
  - 0.0, 0.4
  clippedValue: 0
  remapTo0Through1: true
  inputMultiplier: 16 # Makes wreck concentration very low noise at scale.
  outputMultiplier: 0.05

