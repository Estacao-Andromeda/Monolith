  description: A limited-production special smartgun made as a self-defense weapon for untrained ship crew.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Rifles/mla34.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: GunWieldBonus
    minAngle: -23
    maxAngle: -32
  - type: Gun
    minAngle: 45
    maxAngle: 74
    angleIncrease: 12
    angleDecay: 20
    cameraRecoilScalar: 0
    fireRate: 8
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_Goobstation/Weapons/Guns/Gunshots/smartgun_shoot.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Rifles/mla34.rsi
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineSmart
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineSmart
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgeSmart
        priority: 1
        whitelist:
          tags:
          - CartridgeSmart
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 10000
    vendPrice: 25000
  - type: PirateBountyItem
    id: ExperimentalFactionWeapon
  - type: SmartGun
    requiresWield: true
  - type: LaserPointer
    targetedColor: "#ff0037"
    defaultColor: "#03c2fc"
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 1.5
    pvsIncrease: 0.5
  - type: SpeedModifiedOnWield
    walkModifier: 0.95
    sprintModifier: 0.95
  - type: WieldedCrosshair
    rsi:
      sprite: _RMC14/Interface/MousePointer/smartgun_mouse.rsi
      state: all

- type: entity
  name: HWL FG.J "Iroh" (5.56x45mm)
  parent: BaseWeaponRifle
  id: WeaponRifleIroh
  description: A premium, finely-tuned rifle. Accurate, fast firing, and expensive as shit. Outfitted with Erebus rails on the handguard and carryhandle, and a threaded barrel for attachments.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Rifles/prometheus_a3.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
    - map: ["gripAttachment"]
    - map: ["barrelAttachment"]
      offset: 0.21870, 0 # Reduce by 0.0005 to prevent gaps
    - map: ["opticAttachment"]
  - type: GunWieldBonus
    minAngle: -21
    maxAngle: -47
  - type: Gun
    minAngle: 21
    maxAngle: 58
    angleIncrease: 1.5
    angleDecay: 20
    fireRate: 8.4
    selectedMode: FullAuto
    damageModifier: 0.95 # Brings it down to 152.95 DPS from 161 DPS (assuming perfect accuracy with FMJ on an unarmored target); Lecter has less DPS, but Lecter also has really fucking good accuracy and is free roundstart.
    availableModes:
    - SemiAuto
    - FullAuto
    - Burst
    burstCooldown: 0.5
    burstFireRate: 7
    shotsPerBurst: 3
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/vector_fire.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/sf_rifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine556x45mmFMJ
        insertSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagIn/m16_magin.ogg
        ejectSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagOut/skm_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine556x45mmFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge556x45mmFMJ
        priority: 1
        whitelist:
          tags:
          - Cartridge556x45mmFMJ
      attachment_grip:
        priority: 0
        insertSound: /Audio/Items/screwdriver2.ogg
        ejectSound: /Audio/Items/screwdriver2.ogg
        whitelist:
          tags:
          - MonoGripErebusRailmount
      attachment_barrel:
        insertSound: /Audio/Items/screwdriver.ogg
        ejectSound: /Audio/Items/screwdriver.ogg
        priority: 0
        whitelist:
          tags:
          - MonoSuppressorMulticalRifle
      attachment_optic:
        insertSound: /Audio/Items/screwdriver2.ogg
        ejectSound: /Audio/Items/screwdriver2.ogg
        priority: 0
        whitelist:
          tags:
          - MonoOpticErebusRailmount
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      attachment_grip: !type:ContainerSlot
      attachment_barrel: !type:ContainerSlot
      attachment_optic: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Rifles/prometheus_a3_inhands_32x.rsi
  - type: Item
    sprite: _Mono/Objects/Weapons/Guns/Rifles/prometheus_a3_inhands_32x.rsi
  - type: StaticPrice
    price: 2400
  - type: ESAttachableGun
    slots:
    - name: es-gun-attachments-slot-name-barrel
      containerId: attachment_barrel
      whitelist:
        tags:
        - MonoSuppressorMulticalRifle
    - name: es-gun-attachments-slot-name-grip
      containerId: attachment_grip
      whitelist:
        tags:
        - MonoGripErebusRailmount
    - name: es-gun-attachments-slot-name-optic
      containerId: attachment_optic
      whitelist:
        tags:
        - MonoOpticErebusRailmount
  - type: ActivatableUI
    key: enum.ESAttachableGunUiKey.Key
    verbOnly: true
    verbText: es-gun-attachments-verb-text
  - type: UserInterface
    interfaces:
      enum.ESAttachableGunUiKey.Key:
        type: ESGunAttachmentBui
  - type: ESItemMapper
    mappings:
      gripAttachment:
      - containerId: attachment_grip
        state: grip
        whitelist:
          tags:
          - MonoGripVFG
      - containerId: attachment_grip
        state: lam
        whitelist:
          tags:
          - MonoGripLAM
      - containerId: attachment_grip
        state: light
        whitelist:
          tags:
          - MonoGripLight
      barrelAttachment:
      - containerId: attachment_barrel
        state: suppressed
        whitelist:
          tags:
          - MonoSuppressor
      opticAttachment:
      - containerId: attachment_optic
        state: optic2x
        whitelist:
          tags:
          - MonoOptic2x
      - containerId: attachment_optic
        state: optic4x
        whitelist:
          tags:
          - MonoOptic4x
      - containerId: attachment_optic
        state: optic8x
        whitelist:
          tags:
          - MonoOptic8x

- type: entity
  parent: WeaponCaseLong
  id: WeaponCaseLongIrohSecurity
  suffix: CC, Iroh
  components:
  - type: StorageFill
    contents:
    - id: WeaponRifleIroh
