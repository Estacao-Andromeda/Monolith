#Mercenary vulcan
- type: entity
  name: HWM FCM-C "Vulcan" (7.62x51mm)
  parent: WeaponRifleVulcan
  id: WeaponRifleVulcanFCMC
  description: The Herstal Weapon Manufacture "Vulcan" Civilian Medium combat rifle (Fusil de Combat Moyen Civil) in 762x51mm, this civilian version only has semi-automatic mode and reduced firerate.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Rifles/WeaponRifleVulcanFCMC.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: GunWieldBonus
    minAngle: -20
    maxAngle: -50
  - type: Gun
    minAngle: 21
    maxAngle: 52
    angleIncrease: 1.4
    angleDecay: 24
    fireRate: 4 #240 RPM, its semi-auto anyway
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine762x51mmFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine762x51mmFMJ
            - Magazine762x51mmLowCapacityFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge762x51mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge762x51mmFMJ
  - type: StaticPrice
    price: 1200
    vendPrice: 30000

#Mercenary lecter
- type: entity
  name: HWM FCL "Prometheus" (5.56x45mm)
  parent: BaseWeaponRifle
  id: WeaponRiflePrometheus
  description: The Herstal Weapon Manufacture "Prometheus" Light combat rifle (Fusil de Combat Léger) in 556x45mm. Made to be mass producable for fight against xenos. Its firerate is decent with burst being superior and accuracy poor.
  components:
  - type: Item # Mono
    size: Huge
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Rifles/prometheus.rsi # Mono
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Rifles/prometheus.rsi
  - type: ChamberMagazineAmmoProvider # Mono
    soundRack:
      path: /Audio/Weapons/Guns/Cock/sf_rifle_cock.ogg
  - type: GunWieldBonus
    minAngle: -27
    maxAngle: -40
  - type: Gun
    minAngle: 30
    maxAngle: 46
    angleIncrease: 76
    angleDecay: 7
    cameraRecoilScalar: 0
    fireRate: 3
    selectedMode: Burst
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/light_rifle_1.ogg # Mono
    availableModes:
    - Burst
    - SemiAuto
    - FullAuto
    burstCooldown: 0.5
    burstFireRate: 15
    shotsPerBurst: 3
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine556x45mmFMJ # Mono
        insertSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagIn/m16_magin.ogg # Mono
        ejectSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagOut/skm_magout.ogg # Mono
        priority: 2
        whitelist:
          tags:
            - Magazine556x45mmFMJ # Mono
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge556x45mmFMJ # Mono
        priority: 1
        whitelist:
          tags:
            - Cartridge556x45mmFMJ # Mono
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice # Mono
    price: 1500

- type: entity
  name: SKR-WS MLA-34 smartgun (.160 smart) # TODO - make like 5.56 level smartgun ammo for these
  parent: [BaseWeaponRifle, BaseGunWieldable]
