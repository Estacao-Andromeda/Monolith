- type: entity
  name: VFD PSW "Ratel" (7.62x51mm)
  parent: BaseWeaponLightMachineGun
  id: WeaponLMGRatel
  description: The precision support weapon chambered in 7.62x51mm and fits simple ammo box and all kind of magazines. Based on the Vulcan and made with higher quality materials, A label on the side that seems to have been tampered with reads "FOR MILI-CENARY USE ONLY". An Erebus railmount is present on the reciever for optics.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/LMGs/ratel/Ratel-icon.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
      - map: ["opticAttachment"]
  - type: Item
    sprite: _Mono/Objects/Weapons/Guns/LMGs/ratel/Ratel-inhands.rsi
    shape:
    - 0,0,5,2
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/LMGs/ratel/Ratel-inhands.rsi
  - type: GunWieldBonus
    minAngle: -25
    maxAngle: -35
  - type: Gun
    minAngle: 25
    maxAngle: 40
    angleIncrease: 7
    angleDecay: 28
    fireRate: 6 # 360 rpm
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/heavy_rifle_1.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/batrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: AmmoBox762x51mmFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/lmg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/lmg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine762x51mmBoxSmall
          - Magazine762x51mmFMJ
          - Magazine762x51mmLowCapacityFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge762x51mmFMJ
        priority: 1
        whitelist:
          tags:
          - Cartridge762x51mmFMJ
      attachment_optic:
        startingItem: GunAttachmentOpticErebus8x
        insertSound: /Audio/Items/screwdriver2.ogg
        ejectSound: /Audio/Items/screwdriver2.ogg
        priority: 0
        whitelist:
          tags:
          - MonoOpticErebusRailmount
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      attachment_optic: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 2500
  - type: SpeedModifiedOnWield
    walkModifier: 0.6
    sprintModifier: 0.5 # lower firerate than grizzly but more accurate and bit more damage
  - type: WieldDelay
    baseDelay: 0.8
    modifiedDelay: 0.8
    preventFiring: true
  # Attachment slop
  - type: ESAttachableGun
    slots:
    - name: es-gun-attachments-slot-name-optic
      containerId: attachment_optic
      whitelist:
        tags:
        - MonoOpticErebusRailmount
  - type: ActivatableUI
    key: enum.ESAttachableGunUiKey.Key
    verbOnly: true
    verbText: es-gun-attachments-verb-text
  - type: UserInterface
    interfaces:
      enum.ESAttachableGunUiKey.Key:
        type: ESGunAttachmentBui
  - type: ESItemMapper
    mappings:
      opticAttachment:
      - containerId: attachment_optic
        state: optic2x
        whitelist:
          tags:
          - MonoOptic2x
      - containerId: attachment_optic
        state: optic4x
        whitelist:
          tags:
          - MonoOptic4x
      - containerId: attachment_optic
        state: optic8x
        whitelist:
          tags:
          - MonoOptic8x
