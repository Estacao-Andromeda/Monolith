# Corpo War .45 Mag Vector
- type: entity
  name: NTSF-HCLM-45 (.45 magnum)
  parent: [BaseWeaponSubMachineGun, BaseGunWieldable]
  id: WeaponSubMachineGunVectorNtsfHclm
  description: The NTSF Heavy Caliber Light Machinegun. A very high-quality heavy SMG chambered in .45 magnum for use for the Nano Trasen Security Force and NT spec-ops, from the corporate war.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/SMGs/ntsf_hclm_45.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: GunWieldBonus
    minAngle: -5
    maxAngle: -5
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/SMGs/ntsf_hclm_45.rsi
  - type: Gun
    fireRate: 6
    selectedMode: FullAuto
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/dmr.ogg
    availableModes:
    - SemiAuto
    - FullAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine45_magnumPistolFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine45_magnumPistolFMJ
          - Magazine45_magnumPistolHighCapacityFMJ
          - Magazine45_magnumSubMachineGunFMJ
      gun_chamber:
        name: Chamber
        startingItem: Cartridge45_magnumFMJ
        priority: 1
        whitelist:
          tags:
          - Cartridge45_magnumFMJ
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
