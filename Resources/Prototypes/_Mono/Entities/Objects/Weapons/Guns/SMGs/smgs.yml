    selectedMode: Burst
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/atreides.ogg
    availableModes:
    - Burst
    - FullAuto
    burstCooldown: 0.4
    burstFireRate: 13
    shotsPerBurst: 4
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
