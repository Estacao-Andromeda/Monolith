- type: entity
  name: LWC Vector (9x19mm)
  parent: [BaseWeaponSubMachineGun, BaseGunWieldable]
  id: WeaponSubMachineGunVector9x19mm
  description: An excellent fully automatic SMG. Uses 9x19mm ammo. An Erebus railmount is present on the top of the reciever and the bottom of the handguard for optics and grips.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/SMGs/vector.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
      - map: ["gripAttachment"]
      - map: ["opticAttachment"]
  - type: GunWieldBonus
    minAngle: -5
    maxAngle: -5
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/SMGs/vector.rsi
  - type: Gun
    fireRate: 7.5
    damageModifier: 0.8
    selectedMode: Burst
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/atreides.ogg
    availableModes:
    - Burst
    - SemiAuto
    - FullAuto
    burstCooldown: 0.5
    burstFireRate: 14
    shotsPerBurst: 3
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine9x19mmSubMachineGunFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine9x19mmSubMachineGunFMJ
      gun_chamber:
        name: Chamber
        startingItem: Cartridge9x19mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge9x19mmFMJ
      attachment_grip:
        insertSound: /Audio/Items/screwdriver2.ogg
        ejectSound: /Audio/Items/screwdriver2.ogg
        priority: 0
        whitelist:
          tags:
          - MonoGripErebusRailmount
      attachment_optic:
        insertSound: /Audio/Items/screwdriver2.ogg
        ejectSound: /Audio/Items/screwdriver2.ogg
        priority: 0
        whitelist:
          tags:
          - MonoOpticErebusRailmount
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      attachment_grip: !type:ContainerSlot
      attachment_optic: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: ESAttachableGun
    slots:
    - name: es-gun-attachments-slot-name-grip
      containerId: attachment_grip
      whitelist:
        tags:
        - MonoGripErebusRailmount
  - type: ActivatableUI
    key: enum.ESAttachableGunUiKey.Key
    verbOnly: true
    verbText: es-gun-attachments-verb-text
  - type: UserInterface
    interfaces:
      enum.ESAttachableGunUiKey.Key:
        type: ESGunAttachmentBui
  - type: ESItemMapper
    mappings:
      gripAttachment:
      - containerId: attachment_grip
        state: grip
        whitelist:
          tags:
          - MonoGripVFG
      - containerId: attachment_grip
        state: lam
        whitelist:
          tags:
          - MonoGripLAM
      - containerId: attachment_grip
        state: light
        whitelist:
          tags:
          - MonoGripLight
      opticAttachment:
      - containerId: attachment_optic
        state: optic2x
        whitelist:
          tags:
          - MonoOptic2x
      - containerId: attachment_optic
        state: optic4x
        whitelist:
          tags:
          - MonoOptic4x
      - containerId: attachment_optic
        state: optic8x
        whitelist:
          tags:
          - MonoOptic8x

