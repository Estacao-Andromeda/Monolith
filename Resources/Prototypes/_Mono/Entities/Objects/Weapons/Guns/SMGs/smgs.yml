      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: GunWieldBonus
    minAngle: -17
    maxAngle: -18
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/SMGs/knallstock.rsi
  - type: Gun
    fireRate: 6
