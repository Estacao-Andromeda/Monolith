- type: entity
  name: TCA CS/LR-8 Drozd (.45 ACP)
  parent: BaseWeaponSubMachineGun
  id: WeaponSubMachineGunDrozd
  description: An SMG that once found use among NT security forces, now has found itself as one of the most reliable boarding and anti-boarding weapons on the market. Uses .45 ACP ammo. The barrel is threaded for suppressors, and an Erebus railmount is on the bottom for grips.
  components:
  - type: Item # Mono
    size: Large
    sprite: _Mono/Objects/Weapons/Guns/SMGs/drozd_inhands_32x.rsi
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/SMGs/drozd.rsi # Mono
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
    - map: ["gripAttachment"] # Mono
    - map: ["barrelAttachment"] # Mono
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/SMGs/drozd_inhands_32x.rsi # Mono
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -19
    maxAngle: -20 # -16 -> -20 - Mono
  - type: ChamberMagazineAmmoProvider # Mono
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: Gun
    minAngle: 21
    maxAngle: 32
    fireRate: 7 # Mono
    burstFireRate: 12
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/smg.ogg # Mono
    availableModes:
    - Burst
    - FullAuto
    - SemiAuto
    shotsPerBurst: 3
    burstCooldown: 0.25
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine45_ACPSubMachineGunFMJ
        insertSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagIn/skm_magin.ogg # Mono
        ejectSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagOut/m16_magout.ogg # Mono
        priority: 2
        whitelist:
          tags:
          - Magazine45_ACPSubMachineGunFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge45_ACPFMJ
        priority: 1
        whitelist:
          tags:
          - Cartridge45_ACPFMJ
      # Mono
      attachment_grip:
        insertSound: /Audio/Items/screwdriver2.ogg
        ejectSound: /Audio/Items/screwdriver2.ogg
        priority: 0
        whitelist:
          tags:
          - MonoGripErebusRailmount
      # Mono
      attachment_barrel:
        insertSound: /Audio/Items/screwdriver.ogg
        ejectSound: /Audio/Items/screwdriver.ogg
        priority: 0
        whitelist:
          tags:
          - MonoSuppressorMulticalPistol
  # Mono start
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      attachment_grip: !type:ContainerSlot
      attachment_barrel: !type:ContainerSlot
  - type: ESAttachableGun
    slots:
    - name: es-gun-attachments-slot-name-barrel
      containerId: attachment_barrel
      whitelist:
        tags:
        - MonoSuppressorMulticalPistol
    - name: es-gun-attachments-slot-name-grip
      containerId: attachment_grip
      whitelist:
        tags:
        - MonoGripErebusRailmount
  - type: ActivatableUI
    key: enum.ESAttachableGunUiKey.Key
    verbOnly: true
    verbText: es-gun-attachments-verb-text
  - type: UserInterface
    interfaces:
      enum.ESAttachableGunUiKey.Key:
        type: ESGunAttachmentBui
  - type: ESItemMapper
    mappings:
      gripAttachment:
      - containerId: attachment_grip
        state: grip
        whitelist:
          tags:
          - MonoGripVFG
      - containerId: attachment_grip
        state: lam
        whitelist:
          tags:
          - MonoGripLAM
      - containerId: attachment_grip
        state: light
        whitelist:
          tags:
          - MonoGripLight
      barrelAttachment:
      - containerId: attachment_barrel
        state: suppressed
        whitelist:
          tags:
          - MonoSuppressor
  # Mono end
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice # Mono
    price: 525
  - type: PirateBountyItem # Mono
    id: StandardFactionLongarm
