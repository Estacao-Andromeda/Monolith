    sprite: _Mono/Objects/Weapons/Guns/SMGs/ak220.rsi
  - type: Gun
    minAngle: 22
    maxAngle: 40
    fireRate: 6
    angleIncrease: 21
    angleDecay: 14
    selectedMode: FullAuto
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/smg.ogg
