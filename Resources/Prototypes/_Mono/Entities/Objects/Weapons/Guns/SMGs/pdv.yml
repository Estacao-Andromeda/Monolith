- type: entity
  name: SKR-WS MLA-73 (6.35x40mm caseless)
  parent: [BaseWeaponSubMachineGun, BaseGunWieldable]
  id: WeaponSubMachineGunMla73
  description: A reliable PDW design, commonly issued to pilots and AFV crewmen. This one has been modified with an integral suppressor. Legends around this weapons say it's a Corporate-Era schematic that's been built by the Phaethon Dynasty. Can take 9x19mm smg magazines in a pinch. An Erebus railmount is present on the top and bottom of the handguard for optics and grips.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/SMGs/mla73.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
    - map: ["gripAttachment"]
    - map: ["opticAttachment"]
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/SMGs/mla73.rsi
  - type: GunWieldBonus
    minAngle: -20
    maxAngle: -34
  - type: Gun
    minAngle: 22
    maxAngle: 40
    angleIncrease: 5
    angleDecay: 20
    fireRate: 8
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/mla_fire.ogg
  - type: ChamberMagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine635x40mmCaseless
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine635x40mmCaseless
          - Magazine9x19mmSubMachineGunFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge635x40mmCaseless
        priority: 1
        whitelist:
          tags:
          - Cartridge635x40mmCaseless
      attachment_grip:
        insertSound: /Audio/Items/screwdriver2.ogg
        ejectSound: /Audio/Items/screwdriver2.ogg
        priority: 0
        whitelist:
          tags:
          - MonoGripErebusRailmount
      attachment_optic:
        insertSound: /Audio/Items/screwdriver2.ogg
        ejectSound: /Audio/Items/screwdriver2.ogg
        priority: 0
        whitelist:
          tags:
          - MonoOpticErebusRailmount
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      attachment_grip: !type:ContainerSlot
      attachment_optic: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: ESAttachableGun
    slots:
    - name: es-gun-attachments-slot-name-grip
      containerId: attachment_grip
      whitelist:
        tags:
        - MonoGripErebusRailmount
  - type: ActivatableUI
    key: enum.ESAttachableGunUiKey.Key
    verbOnly: true
    verbText: es-gun-attachments-verb-text
  - type: UserInterface
    interfaces:
      enum.ESAttachableGunUiKey.Key:
        type: ESGunAttachmentBui
  - type: ESItemMapper
    mappings:
      gripAttachment:
      - containerId: attachment_grip
        state: grip
        whitelist:
          tags:
          - MonoGripVFG
      - containerId: attachment_grip
        state: lam
        whitelist:
          tags:
          - MonoGripLAM
      - containerId: attachment_grip
        state: light
        whitelist:
          tags:
          - MonoGripLight
      opticAttachment:
      - containerId: attachment_optic
        state: optic2x
        whitelist:
          tags:
          - MonoOptic2x
      - containerId: attachment_optic
        state: optic4x
        whitelist:
          tags:
          - MonoOptic4x
      - containerId: attachment_optic
        state: optic8x
        whitelist:
          tags:
          - MonoOptic8x

- type: entity
  name: MA PDW-58 Atreides (5.7x28mm)
  parent: BaseWeaponSubMachineGun
  id: WeaponSubMachineGunAtreides
  description: Midnight Arms Co. Streamlined SMG that's commonly found use among uprisings and criminals. Uses 5.7x28mm ammo.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/SMGs/atreides.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    fireRate: 8.5
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/atreides_fire.ogg
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice # Mono
    price: 2000
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine57x28mmSubMachineGunFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine57x28mmSubMachineGunFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge57x28mmFMJ
        priority: 1
        whitelist:
          tags:
          - Cartridge57x28mmFMJ

- type: entity
  name: CS C-20r submachine gun (9x19mm)
  parent: BaseWeaponSubMachineGun
  id: WeaponSubMachineGunC20r
  description: A Corporate-Era SMG, once used by Nuclear Operatives, it now finds purchase among the Phaethon Dynasty. Uses 9x19mm ammo.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/SMGs/c20r.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: Objects/Weapons/Guns/SMGs/c20r.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -19
    maxAngle: -16
  - type: Gun
    minAngle: 21
    maxAngle: 32
    shotsPerBurst: 5
    damageModifier: 0.85
    availableModes:
    - Burst
    - FullAuto
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/c-20r.ogg
  - type: ChamberMagazineAmmoProvider
    autoEject: true
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice # Mono
    price: 625
