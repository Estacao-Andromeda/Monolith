- type: entity
  id: 90mmBulletAP
  parent: 90mmBulletBase
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 70
        Structural: 400
    penetrationThreshold: 1000
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/shells.rsi
    layers:
    - state: 90mmAP
  - type: PointLight
    color: orange
  - type: RadarBlip
    scale: 2.5
    shape: triangle
    radarColor: "#1df5cd"

- type: entity
  id: 90mmBulletFlak
  parent: 90mmBulletBase
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 70
        Structural: 100
    penetrationThreshold: 500
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/shells.rsi
    layers:
    - state: 90mmFLAK
  - type: PointLight
    color: orange
  - type: RadarBlip
    scale: 2.5
    shape: triangle
    radarColor: "#1df5cd"
  - type: ProjectileGrenade
    fillPrototype: Shrapnel90mmFlak
    capacity: 12 # lag!
    minVelocity: 8
    maxVelocity: 8
    randomAngle: true
  - type: TriggerOnProximity
    requiresAnchored: false
    enabled: true
    shape:
      !type:PhysShapeCircle
      radius: 5
      mask:
      - BulletImpassable
      - Opaque
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container

- type: entity
  id: Shrapnel90mmFlak
  name: shrapnel
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    state: buckshot
  - type: Projectile
    damage:
      types:
        Piercing: 5
        Slash: 10 # worry not. missiles take 1 million slash.
    armorPenetration: 0
    penetrationThreshold: 200
  - type: Fixtures
    fixtures:
      projectile:
        shape: !type:PhysShapeCircle
          radius: 4
        hard: false
        mask:
        - Impassable
        - BulletImpassable
      fly-by:
        shape: !type:PhysShapeCircle
          radius: 1.5
        layer:
        - Impassable
        - MidImpassable
        - HighImpassable
        - LowImpassable
        hard: False
  - type: RadarBlip
    scale: 2
    shape: circle
    radarColor: "#1df5cd"
  - type: TimedDespawn
    lifetime: 0.4

- type: entity
  id: 90mmBulletMinelayer
  name: 90mm mine-laying projectile
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 70
        Structural: 100
    penetrationThreshold: 500
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/shells.rsi
    layers:
    - state: 90mmMINE
  - type: PointLight
    color: orange
  - type: RadarBlip
    scale: 2.5
    shape: triangle
    radarColor: "#1df5cd"
  - type: TriggerOnSpawn
    timerOnly: true
  - type: TimedDespawn
    lifetime: 1
  - type: OnUseTimerTrigger
    delay: 1
    examinable: false
  - type: ProjectileGrenade
    fillPrototype: NavalMine90mm
    capacity: 3
    minVelocity: 2
    maxVelocity: 2
    randomAngle: true
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container

- type: entity
  id: NavalMine90mm
  name: naval mine
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    noRot: false
    sprite: _Mono/Objects/SpaceArtillery/shells.rsi
    layers:
    - state: mine
    scale: 0.1, 0.1
  - type: Clickable
  - type: LagCompensation
  - type: Projectile
    deleteOnCollide: true
    damage:
      types:
        Blunt: 5
    armorPenetration: 0
    penetrationThreshold: 5
  - type: Physics
    bodyStatus: InAir
    angularDamping: 50
    linearDamping: 50
    fixedRotation: False
    bodyType: Dynamic
  - type: TileFrictionModifier
    modifier: 100000
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeCircle
          radius: 2
        mask:
        - ItemMask # BulletImpassable
  - type: TriggerOnCollide
    fixtureID: projectile
  - type: TriggerOnProximity
    requiresAnchored: false
    enabled: true
    shape:
      !type:PhysShapeCircle
      radius: 5
      mask:
      - Impassable
      - Opaque
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: HardBomb
    totalIntensity: 50
    intensitySlope: 5
    maxIntensity: 400
  - type: RadarBlip
    scale: 0.7
    shape: circle
    radarColor: "#1df5cd"
  - type: TimedDespawn
    lifetime: 1800
  - type: TargetSeeking # This is ultra-giga jank, it's the only way I could get it to slow down instead of going on forever.
    arcLines: false
    scanArc: 0
    launchSpeed: 0
    maxSpeed: 3

