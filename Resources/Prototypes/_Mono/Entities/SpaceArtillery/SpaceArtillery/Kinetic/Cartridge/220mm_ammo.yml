# Boxes because I hate manually loading 24 shells

- type: entity
  id: Box220mmAPHE
  name: "220mm APHE ammo box"
  description: "A big box containing 24 220mm APHE rounds. Usable by vessel-mounted artillery pieces."
  parent: [BaseItem, RecyclableItemSteelTiny]
  components:
  - type: Item
    size: Huge
  - type: BallisticAmmoProvider
    infiniteUnspawned: false
    proto: 220mmCartridgeAPHE
    capacity: 24
    mayTransfer: true
    whitelist:
      tags:
      - 220mmCartridge
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Boxes/generic_heavy_shipgun_box.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Appearance

