- type: entity
  id: 255mmCartridgeAPHE
  name: 255mm APHE shell
  description: A chemically-propelled armor-piercing high-explosive shell for 255mm cannons.
  parent: BaseGrenade
  components:
  - type: Tag
    tags:
    - 255mmCartridge
  - type: Item
    size: Huge
  - type: CartridgeAmmo
    proto: 255mmBulletAPHE
    deleteOnSpawn: true
    muzzleFlash: null
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/shells.rsi
    layers:
    - state: 255mmAPHE
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: Explosive
    explosionType: Default
    maxIntensity: 100
    intensitySlope: 3
    totalIntensity: 75
  - type: ExplodeOnTrigger
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic

