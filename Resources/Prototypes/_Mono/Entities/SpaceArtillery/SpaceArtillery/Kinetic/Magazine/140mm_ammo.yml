    tags:
    - Cartridge
    - 140mmCartridge
  - type: CartridgeAmmo
    deleteOnSpawn: true
    proto: 140mmBulletSACLOS
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/shells.rsi
    layers:
    - state: 150mmAP
