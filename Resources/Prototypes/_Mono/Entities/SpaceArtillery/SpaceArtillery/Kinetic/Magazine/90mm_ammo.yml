- type: entity
  id: 90mmMagazineHE
  name: "90mm HE ammo loader"
  description: "An ammunition loader containing infinite 90mm high-explosive rounds. Usable by 90mm vessel-mounted artillery pieces."
  parent: [BaseItem, RecyclableItemSteelTiny]
  components:
  - type: Tag
    tags:
    - Magazine90mm
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    infiniteUnspawned: true
    proto: 90mmCartridgeHE
    capacity: 1 # normally should hold 400
    mayTransfer: true
    whitelist:
      tags:
      - 90mmCartridge
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/magazines.rsi
    layers:
    - state: 90mmHE
      map: [ "enum.GunVisualLayers.Base" ]
  - type: Appearance

- type: entity
  id: 90mmCartridgeHE
  name: cartridge (90mm HE)
  parent: BaseCartridge
  components:
  - type: Tag
    tags:
    - Cartridge
    - 90mmCartridge
  - type: CartridgeAmmo
    deleteOnSpawn: true
    proto: 90mmBulletHE
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/shells.rsi
    layers:
    - state: 90mmHE
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1
  - type: Explosive
    explosionType: Default
    maxIntensity: 100
    intensitySlope: 3
    totalIntensity: 1
  - type: ExplodeOnTrigger
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic

